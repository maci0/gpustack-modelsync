version: 2
updates:
  # GitHub Actions used in ci.yml / release.yml (clears the Node-20 deprecation
  # path as newer action majors land).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Python deps, resolved from uv.lock.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # The orchestrator image base (Dockerfile FROM).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
